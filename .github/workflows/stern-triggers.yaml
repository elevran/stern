name: stern

on:
  issue_comment:
    types: [created, edited]

  pull_request_target:
    types: [opened, synchronize, edited, closed, reopened]

  issues:
    types: [opened]

  # Uncomment when merge-check is ready (Task 1.5):
  # check_suite:
  #   types: [completed]

  schedule:
    - cron: '0 6 * * *'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build stern
        run: go build -o stern ./cmd/stern/

      - uses: actions/upload-artifact@v7
        with:
          name: stern-binary
          path: stern
          retention-days: 1

  slash-command:
    name: slash-command
    needs: build
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for GraphQL enablePullRequestAutoMerge / disablePullRequestAutoMerge
      issues: write
      pull-requests: write
      checks: write     # required for /retest to re-run failed check runs
    concurrency:
      group: stern-comment-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: stern-binary

      - run: chmod +x stern

      - name: Restore OWNERS cache
        uses: actions/cache@v4
        with:
          path: .owners-cache.json
          key: owners-${{ hashFiles('**/OWNERS', '**/OWNERS_ALIASES') }}

      - name: Run slash-command
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNERS_CACHE_FILE: .owners-cache.json
        run: ./stern slash-command --config .github/stern.yaml

  pr-event:
    name: pr-event
    needs: build
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for GraphQL enablePullRequestAutoMerge / disablePullRequestAutoMerge
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: stern-binary

      - run: chmod +x stern

      - name: Restore OWNERS cache
        uses: actions/cache@v4
        with:
          path: .owners-cache.json
          key: owners-${{ hashFiles('**/OWNERS', '**/OWNERS_ALIASES') }}

      - name: Run pr-event
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNERS_CACHE_FILE: .owners-cache.json
        run: ./stern pr-event --config .github/stern.yaml

  issue-event:
    name: issue-event
    needs: build
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: stern-binary

      - run: chmod +x stern

      - name: Run issue-event
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stern issue-event --config .github/stern.yaml

  # Uncomment when merge-check is ready (Task 1.5):
  # merge-check:
  #   name: merge-check
  #   needs: build
  #   if: github.event_name == 'check_suite'
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     pull-requests: write
  #   steps:
  #     - uses: actions/checkout@v7
  #       with:
  #         ref: main
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: stern-binary
  #     - run: chmod +x stern
  #     - name: Run merge-check
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #       run: ./stern merge-check --config .github/stern.yaml

  lifecycle-sweep:
    name: lifecycle-sweep
    needs: build
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          name: stern-binary
      - run: chmod +x stern
      - name: Run lifecycle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./stern lifecycle --config .github/stern.yaml
